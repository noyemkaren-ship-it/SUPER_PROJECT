<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #cdd6f4; text-align: center; padding: 50px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border-radius: 8px; border: none; }
        button { padding: 10px 30px; background: #a6e3a1; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        a { color: #89b4fa; }
    </style>
</head>
<body>
    <h1>Регистрация</h1>
    <input type="text" id="name" placeholder="Имя">
    <input type="password" id="password" placeholder="Пароль">
    <input type="number" id="age" placeholder="Возраст">
    <button onclick="register()">Создать аккаунт</button>
    <a href="/login">Войти</a>
    <script>
        async function register() {
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            const age = document.getElementById('age').value;
            const resp = await fetch(`/users/register?name=${name}&password=${password}&age=${age}`, { method: 'POST' });
            const data = await resp.json();
            alert(JSON.stringify(data));
            if (!data.error) location.href = '/catalog';
        }
    </script>
</body>
</html>
