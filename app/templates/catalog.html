<!-- templates/catalog.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Tiger Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d1a; color: #cdd6f4; }
        .header { background: #1a1a35; padding: 20px; text-align: center; border-bottom: 1px solid #2a2a4a; }
        .header h1 { color: #f5c542; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .item { background: #1a1a35; padding: 20px; border-radius: 12px; border: 1px solid #2a2a4a; position: relative; }
        .item h3 { color: #a6e3a1; margin-bottom: 8px; }
        .item .price { color: #f5c542; font-size: 1.2rem; font-weight: bold; }
        .item .seller { color: #8888aa; font-size: 0.9rem; }
        .item button { position: absolute; bottom: 15px; right: 15px; padding: 8px 16px; background: #a6e3a1; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .item button:hover { background: #89d48a; }
        .item button:disabled { background: #45475a; cursor: not-allowed; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .nav a, .nav button { background: #1a1a35; color: #cdd6f4; text-decoration: none; padding: 12px 25px; border-radius: 12px; border: 1px solid #2a2a4a; cursor: pointer; font-size: 1rem; }
        .nav a:hover, .nav button:hover { border-color: #f5c542; }
        .message { text-align: center; padding: 10px; margin: 10px 0; border-radius: 8px; display: none; }
        .message.success { background: rgba(166,227,161,0.2); color: #a6e3a1; border: 1px solid #a6e3a1; display: block; }
        .message.error { background: rgba(243,139,168,0.2); color: #f38ba8; border: 1px solid #f38ba8; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ Каталог товаров</h1>
    </div>
    <div class="container">
        <div class="message" id="message"></div>
        <div class="items" id="items"></div>
        <div class="nav">
            <a href="/">🏠 На главную</a>
            <button onclick="loadFromGo()">🐹 Обновить с Go</button>
        </div>
    </div>
    <script>
        async function loadFromGo() {
            try {
                const resp = await fetch('http://localhost:3333/items');
                const data = await resp.json();
                renderItems(data);
            } catch(e) {
                showMessage('Go-сервер недоступен', 'error');
            }
        }

        async function buyItem(id, name, seller, price) {
            try {
                const resp = await fetch(`/orders/create?quantity=1&salesman_name=${seller}&price=${price}`, { method: 'POST' });
                if (resp.ok) {
                    showMessage(`Куплено: ${name} за ${price}₽`, 'success');
                    loadFromGo();
                } else {
                    const data = await resp.json();
                    showMessage(data.detail || 'Ошибка покупки', 'error');
                }
            } catch(e) {
                showMessage('Ошибка соединения', 'error');
            }
        }

        function renderItems(items) {
            const container = document.getElementById('items');
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#8888aa;">Товаров пока нет</p>';
                return;
            }
            container.innerHTML = items.map(i => `
                <div class="item" id="item-${i.ID}">
                    <h3>${i.Name}</h3>
                    <p class="price">${i.Price} ₽</p>
                    <p class="seller">Продавец: ${i.SalesmanName}</p>
                    <p>Категория: ${i.Category}</p>
                    <button onclick="buyItem(${i.ID}, '${i.Name}', '${i.SalesmanName}', ${i.Price})">Купить</button>
                </div>
            `).join('');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.className = 'message', 3000);
        }

        loadFromGo();
    </script>
</body>
</html>
