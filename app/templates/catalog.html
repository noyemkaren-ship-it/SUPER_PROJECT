<!-- templates/catalog.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Tiger Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d1a;
            color: #cdd6f4;
            min-height: 100vh;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
        }
        .container {
            max-width: 1200px; margin: 0 auto; padding: 30px 20px;
            position: relative; z-index: 1;
        }
        .header {
            text-align: center; margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem; color: #f5c542;
            text-shadow: 0 0 30px rgba(245,197,66,0.3);
        }
        .header p { color: #8888aa; }
        .message {
            text-align: center; padding: 12px; border-radius: 10px;
            margin-bottom: 20px; display: none;
        }
        .message.success { background: rgba(166,227,161,0.15); color: #a6e3a1; border: 1px solid #a6e3a1; display: block; }
        .message.error { background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid #f38ba8; display: block; }
        .items {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .item {
            background: rgba(26,26,53,0.8); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 25px; border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .item:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .item h3 { color: #a6e3a1; font-size: 1.3rem; margin-bottom: 8px; }
        .item .price { font-size: 1.5rem; color: #f5c542; font-weight: 700; margin: 8px 0; }
        .item .seller { color: #8888aa; font-size: 0.9rem; }
        .item .category { display: inline-block; background: #252545; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; margin-top: 8px; }
        .item button {
            width: 100%; margin-top: 15px; padding: 12px;
            background: #a6e3a1; color: #1a1a2e; border: none;
            border-radius: 10px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
        }
        .item button:hover:not(:disabled) { background: #89d48a; transform: scale(1.02); }
        .item button:disabled { background: #45475a; cursor: not-allowed; }
        .nav {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            display: inline-block; padding: 14px 28px; border-radius: 12px;
            text-decoration: none; font-weight: 700; cursor: pointer;
            transition: 0.3s; border: 1px solid #2a2a4a; font-size: 1rem;
            background: rgba(26,26,53,0.8); color: #cdd6f4;
        }
        .btn:hover { border-color: #f5c542; box-shadow: 0 0 20px rgba(245,197,66,0.2); }
        .btn.accent { background: #f5c542; color: #1a1a2e; border-color: #f5c542; }
        .btn.accent:hover { box-shadow: 0 0 25px rgba(245,197,66,0.4); }
        .empty { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb" style="width:300px;height:300px;background:rgba(245,197,66,0.06);top:-50px;left:-50px;"></div>
        <div class="orb" style="width:250px;height:250px;background:rgba(137,180,250,0.06);bottom:-50px;right:-50px;"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🛍️ Каталог товаров</h1>
            <p>Все товары загружаются через Go-микросервис</p>
        </div>

        <div class="message" id="message"></div>
        <div class="items" id="items"></div>

        <div class="nav">
            <a href="/" class="btn">🏠 На главную</a>
            <button class="btn" onclick="loadItems()">🐹 Обновить</button>
            <button class="btn accent" onclick="spinWheel()">🎰 Колесо (C++)</button>
        </div>
    </div>

    <script>
        async function loadItems() {
            try {
                const resp = await fetch('/go/items');
                if (!resp.ok) throw new Error('Go недоступен');
                const data = await resp.json();
                renderItems(data);
            } catch(e) {
                showMessage('Go-сервер недоступен', 'error');
                document.getElementById('items').innerHTML = '<p class="empty">Не удалось загрузить товары</p>';
            }
        }

        async function buyItem(id, name, seller, price, btn) {
            btn.disabled = true;
            btn.textContent = 'Покупаем...';
            try {
                const resp = await fetch(`/go/orders?quantity=1&salesman_name=${seller}&price=${price}`, { method: 'POST' });
                if (resp.ok) {
                    showMessage(`${name} куплен за ${price}₽!`, 'success');
                    document.getElementById(`item-${id}`).remove();
                } else {
                    const data = await resp.json();
                    showMessage(data.detail || 'Ошибка покупки', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Купить';
                }
            } catch(e) {
                showMessage('Ошибка соединения', 'error');
                btn.disabled = false;
                btn.textContent = 'Купить';
            }
        }

        function renderItems(items) {
            const container = document.getElementById('items');
            if (!items || items.length === 0) {
                container.innerHTML = '<p class="empty">Товаров пока нет</p>';
                return;
            }
            container.innerHTML = items.map(i => `
                <div class="item" id="item-${i.ID}">
                    <h3>${i.Name}</h3>
                    <p class="price">${i.Price} ₽</p>
                    <p class="seller">Продавец: ${i.SalesmanName}</p>
                    <span class="category">${i.Category}</span>
                    <button onclick="buyItem(${i.ID}, '${i.Name.replace(/'/g, "\\'")}', '${i.SalesmanName.replace(/'/g, "\\'")}', ${i.Price}, this)">Купить</button>
                </div>
            `).join('');
        }

        async function spinWheel() {
            try {
                const resp = await fetch('/cpp/wheel');
                const data = await resp.json();
                showMessage(`🎰 Вы выиграли: ${data.prize} монет!`, 'success');
            } catch(e) {
                showMessage('C++ сервер недоступен', 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.className = 'message', 3000);
        }

        loadItems();
    </script>
</body>
</html>
