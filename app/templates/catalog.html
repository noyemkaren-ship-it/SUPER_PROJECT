<!-- templates/catalog.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Tiger Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d1a;
            color: #cdd6f4;
            min-height: 100vh;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            animation: float 8s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .container {
            max-width: 1200px; margin: 0 auto; padding: 30px 20px;
            position: relative; z-index: 1;
        }
        .header {
            text-align: center; margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem; color: #f5c542;
            text-shadow: 0 0 40px rgba(245,197,66,0.4), 0 0 80px rgba(245,197,66,0.2);
            letter-spacing: -1px;
        }
        .header p { color: #8888aa; font-size: 1.1rem; }
        .message {
            text-align: center; padding: 15px 20px; border-radius: 12px;
            margin-bottom: 25px; display: none; font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .message.success { background: rgba(166,227,161,0.15); color: #a6e3a1; border: 1px solid #a6e3a1; display: block; }
        .message.error { background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid #f38ba8; display: block; }
        .items {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; margin-bottom: 30px;
        }
        .item {
            background: linear-gradient(145deg, rgba(26,26,53,0.9), rgba(18,18,40,0.9));
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 28px; border: 1px solid #2a2a4a;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .item::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(245,197,66,0.05) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        .item:hover::before { opacity: 1; }
        .item:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-color: #f5c542; }
        .item h3 { color: #a6e3a1; font-size: 1.4rem; margin-bottom: 10px; position: relative; z-index: 1; }
        .item .price {
            font-size: 2rem; color: #f5c542; font-weight: 800;
            margin: 10px 0; position: relative; z-index: 1;
            text-shadow: 0 0 15px rgba(245,197,66,0.3);
        }
        .item .seller { color: #8888aa; font-size: 0.9rem; position: relative; z-index: 1; }
        .item .category {
            display: inline-block; background: rgba(245,197,66,0.15);
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
            margin-top: 10px; position: relative; z-index: 1;
            border: 1px solid rgba(245,197,66,0.3);
        }
        .item button {
            width: 100%; margin-top: 18px; padding: 14px;
            background: linear-gradient(145deg, #a6e3a1, #7bc47f);
            color: #1a1a2e; border: none; border-radius: 12px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.3s; position: relative; z-index: 1;
            letter-spacing: 0.5px;
        }
        .item button:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 8px 25px rgba(166,227,161,0.3); }
        .item button:disabled { background: #45475a; cursor: not-allowed; }
        .nav {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 14px; text-decoration: none;
            font-weight: 700; cursor: pointer; transition: all 0.3s;
            border: 1px solid #2a2a4a; font-size: 1rem;
            background: rgba(26,26,53,0.8); color: #cdd6f4;
            backdrop-filter: blur(5px);
        }
        .btn:hover { border-color: #f5c542; box-shadow: 0 0 25px rgba(245,197,66,0.25); }
        .btn.accent { background: linear-gradient(145deg, #f5c542, #d4a017); color: #1a1a2e; border-color: #f5c542; font-weight: 800; }
        .btn.accent:hover { box-shadow: 0 0 30px rgba(245,197,66,0.5); transform: translateY(-2px); }
        .empty { text-align: center; color: #666; padding: 60px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb" style="width:400px;height:400px;background:rgba(245,197,66,0.06);top:-100px;left:-100px;"></div>
        <div class="orb" style="width:350px;height:350px;background:rgba(137,180,250,0.06);bottom:-100px;right:-100px;animation-delay: 4s;"></div>
        <div class="orb" style="width:250px;height:250px;background:rgba(166,227,161,0.05);top:50%;left:50%;animation-delay: 2s;"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🛍️ Каталог товаров</h1>
            <p>Товары загружаются через Go-микросервис. Покупка — через Python.</p>
        </div>

        <div class="message" id="message"></div>
        <div class="items" id="items"></div>

        <div class="nav">
            <a href="/" class="btn">🏠 На главную</a>
            <button class="btn" onclick="loadItems()">🐹 Обновить</button>
            <button class="btn accent" onclick="spinWheel()">🎰 Колесо (C++)</button>
        </div>
    </div>

    <script>
        async function loadItems() {
            try {
                const resp = await fetch('/go/items');
                if (!resp.ok) throw new Error('Go недоступен');
                const data = await resp.json();
                renderItems(data);
            } catch(e) {
                showMessage('Go-сервер недоступен', 'error');
                document.getElementById('items').innerHTML = '<p class="empty">Не удалось загрузить товары</p>';
            }
        }

        async function buyItem(id, name, seller, price, btn) {
            btn.disabled = true;
            btn.textContent = 'Покупаем...';
            try {
                const resp = await fetch(`/orders/create?quantity=1&salesman_name=${seller}&price=${price}`, { method: 'POST' });
                if (resp.ok) {
                    const data = await resp.json();
                    showMessage(`${name} куплен за ${price}₽!`, 'success');
                    document.getElementById(`item-${id}`).style.opacity = '0';
                    setTimeout(() => document.getElementById(`item-${id}`).remove(), 300);
                } else {
                    const data = await resp.json();
                    showMessage(data.detail || 'Ошибка покупки', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Купить';
                }
            } catch(e) {
                showMessage('Ошибка соединения', 'error');
                btn.disabled = false;
                btn.textContent = 'Купить';
            }
        }

        function renderItems(items) {
            const container = document.getElementById('items');
            if (!items || items.length === 0) {
                container.innerHTML = '<p class="empty">Товаров пока нет</p>';
                return;
            }
            container.innerHTML = items.map(i => `
                <div class="item" id="item-${i.ID}">
                    <h3>${i.Name}</h3>
                    <p class="price">${i.Price} ₽</p>
                    <p class="seller">Продавец: ${i.SalesmanName}</p>
                    <span class="category">${i.Category}</span>
                    <button onclick="buyItem(${i.ID}, '${i.Name.replace(/'/g, "\\'")}', '${i.SalesmanName.replace(/'/g, "\\'")}', ${i.Price}, this)">Купить</button>
                </div>
            `).join('');
        }

        async function spinWheel() {
            try {
                const resp = await fetch('/cpp/wheel');
                const data = await resp.json();
                showMessage(`🎰 Вы выиграли: ${data.prize} монет!`, 'success');
            } catch(e) {
                showMessage('C++ сервер недоступен', 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.className = 'message', 3000);
        }

        loadItems();
    </script>
</body>
</html>
