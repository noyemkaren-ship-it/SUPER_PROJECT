<!-- templates/orders.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы | Tiger Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d1a; color: #cdd6f4; min-height: 100vh;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
        }
        .container {
            max-width: 800px; margin: 0 auto; padding: 30px 20px;
            position: relative; z-index: 1;
        }
        .header {
            text-align: center; margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem; color: #f5c542;
            text-shadow: 0 0 30px rgba(245,197,66,0.3);
        }
        .summary {
            background: rgba(26,26,53,0.8); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 25px; margin-bottom: 25px;
            border: 1px solid #2a2a4a; display: flex;
            justify-content: space-between; flex-wrap: wrap; gap: 15px;
        }
        .summary-item h3 { color: #a6e3a1; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .summary-item p { font-size: 1.5rem; font-weight: 700; color: #f5c542; }
        .orders { display: flex; flex-direction: column; gap: 12px; }
        .order {
            background: rgba(26,26,53,0.8); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 20px; border: 1px solid #2a2a4a;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; transition: 0.2s;
        }
        .order:hover { border-color: #f5c542; }
        .order-info p { margin: 4px 0; color: #8888aa; }
        .order-info p strong { color: #cdd6f4; }
        .order-total { font-size: 1.4rem; font-weight: 700; color: #a6e3a1; }
        .btn {
            display: inline-block; padding: 14px 28px; border-radius: 12px;
            text-decoration: none; font-weight: 700; cursor: pointer;
            transition: 0.3s; border: 1px solid #2a2a4a; font-size: 1rem;
            background: rgba(26,26,53,0.8); color: #cdd6f4; text-align: center;
        }
        .btn:hover { border-color: #f5c542; box-shadow: 0 0 20px rgba(245,197,66,0.2); }
        .empty { text-align: center; color: #666; padding: 50px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb" style="width:250px;height:250px;background:rgba(166,227,161,0.06);top:30%;left:-50px;"></div>
        <div class="orb" style="width:200px;height:200px;background:rgba(243,139,168,0.06);bottom:-50px;right:-50px;"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📦 Мои заказы</h1>
        </div>

        <div class="summary" id="summary" style="display:none;">
            <div class="summary-item">
                <h3>Всего заказов</h3>
                <p id="total-count">0</p>
            </div>
            <div class="summary-item">
                <h3>Общая сумма</h3>
                <p id="total-sum">0 ₽</p>
            </div>
        </div>

        <div class="orders" id="orders"></div>
        <br>
        <a href="/" class="btn">🏠 На главную</a>
    </div>

    <script>
        async function loadOrders() {
            try {
                const resp = await fetch('/orders/all');
                if (!resp.ok) { location.href = '/login'; return; }
                const data = await resp.json();

                const container = document.getElementById('orders');
                if (data.length === 0) {
                    container.innerHTML = '<p class="empty">У вас пока нет заказов. Купите что-нибудь в каталоге!</p>';
                    return;
                }

                document.getElementById('summary').style.display = 'flex';
                document.getElementById('total-count').textContent = data.length;
                const total = data.reduce((sum, o) => sum + o.total_price, 0);
                document.getElementById('total-sum').textContent = total + ' ₽';

                container.innerHTML = data.map(o => `
                    <div class="order">
                        <div class="order-info">
                            <p><strong>Количество:</strong> ${o.quantity} шт.</p>
                            <p><strong>Продавец:</strong> ${o.salesman_name}</p>
                            <p><strong>Цена за шт:</strong> ${o.price} ₽</p>
                        </div>
                        <div class="order-total">${o.total_price} ₽</div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('orders').innerHTML = '<p class="empty">Ошибка загрузки заказов</p>';
            }
        }
        loadOrders();
    </script>
</body>
</html>
